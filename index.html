<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DomoSmart – Smart Home. Einfach. Intelligent.</title>
  <meta
    name="description"
    content="DomoSmart plant, installiert und automatisiert moderne Smart-Home-Lösungen mit Home Assistant – individuell, lokal und zuverlässig."
  />

  <style>
    :root {
      --bg: #081225;
      --bg-soft: #0f1e38;
      --card: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.1);
      --text: #f4f7fb;
      --muted: #b8c4d6;
      --accent: #22c55e;
      --accent-dark: #16a34a;
      --white: #ffffff;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
      --radius: 22px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.12), transparent 22%),
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.14), transparent 28%),
        linear-gradient(180deg, #07111f 0%, #081225 100%);
      color: var(--text);
    }

    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      backdrop-filter: blur(14px);
      background: rgba(8, 18, 37, 0.72);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 78px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 700;
    }

    .brand img {
      height: 42px;
    }

    .menu {
      display: flex;
      gap: 26px;
      color: var(--muted);
    }

    .nav-cta {
      padding: 12px 18px;
      border-radius: 14px;
      background: var(--accent);
      color: #07111f;
      font-weight: 700;
    }

    .hero {
      padding: 80px 0;
      text-align: center;
    }

    .hero-logo {
      height: 90px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 3rem;
      margin: 0;
    }

    p {
      color: var(--muted);
    }
  </style>
</head>

<body>

<header class="topbar">
  <div class="container nav">

    <!-- 🔥 LOGO OBEN -->
    <a class="brand" href="#">
      <img src="logo.png" alt="DomoSmart Logo">
      <span>DomoSmart</span>
    </a>

    <nav class="menu">
      <a href="#leistungen">Leistungen</a>
      <a href="#kontakt">Kontakt</a>
    </nav>

    <a class="nav-cta" href="#kontakt">Beratung</a>
  </div>
</header>

<section class="hero">

  <!-- 🔥 GROSSES LOGO -->
  <img src="logo.png" alt="DomoSmart Logo" class="hero-logo">

  <h1>DomoSmart</h1>
  <p>Smart Home. Einfach. Intelligent.</p>

</section>

</body>
</html>
